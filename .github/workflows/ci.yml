name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check, Test, Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Check package version alignment
        run: python3 scripts/check_versions.py

      - name: cargo check (workspace)
        run: cargo check

      - name: cargo test (rustez, unit only)
        run: cargo test -p rustez

      - name: cargo clippy (rustez, deny warnings)
        run: cargo clippy -p rustez -- -D warnings

      - name: cargo clippy (rustez-py, deny warnings)
        run: cargo clippy -p rustez-py -- -D warnings

      - name: cargo doc (rustez)
        run: cargo doc -p rustez --no-deps

      - name: Install cargo-audit
        run: cargo install cargo-audit

      # Ignored advisories — see .cargo/audit-ignored.md for full
      # reachability analysis, mitigations, and review dates. Keep the
      # --ignore flags below in sync with that file.
      #
      # RUSTSEC-2023-0071 — rsa 0.10.0-rc.16 Marvin timing side-channel.
      #   Reached via russh's SSH host-key/RSA-auth path; no upstream patch.
      #   Review by 2026-11-18.
      - name: Surface ignored advisories
        run: |
          echo "::warning::cargo audit ignores RUSTSEC-2023-0071 — see .cargo/audit-ignored.md"

      - name: cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

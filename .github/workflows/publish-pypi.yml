name: Publish Python wheel to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-manylinux:
    name: Build manylinux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: auto
          args: --release -m rustez-py/Cargo.toml --out dist -i python3.12

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-manylinux-x86_64
          path: dist/*.whl

  build-musllinux:
    name: Build musllinux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-musl
          manylinux: musllinux_1_2
          args: --release -m rustez-py/Cargo.toml --out dist -i python3.12

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-x86_64
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-manylinux, build-musllinux]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
